<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="priceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Price tag shape -->
  <path d="M4 4 L18 4 L28 16 L18 28 L4 28 Z" fill="url(#priceGradient)" stroke="white" stroke-width="1.5"/>
  
  <!-- Dollar sign -->
  <text x="11" y="21" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">$</text>
  
  <!-- Small circle for tag hole -->
